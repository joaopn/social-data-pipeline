# ML GPU profile pipeline configuration
# Host paths configured in .env

processing:
  data_types:                # Which data types to process
    - submissions
    - comments
  watch_interval: 0          # Check for new files every N minutes (0 = run once)

# GPU classifiers to run (from gpu_classifiers.yaml)
# If use_lingua = true, you must run lingua profile first to generate lingua output
gpu_classifiers:
  - toxic_roberta
  - go_emotions
