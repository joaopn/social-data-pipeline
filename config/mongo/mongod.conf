# MongoDB server configuration for Social Data Pipeline
# Mounted into the mongo container at /etc/mongod.conf
#
# Memory: cacheSizeGB is set via MONGO_CACHE_SIZE_GB in .env
# (applied as --wiredTigerCacheSizeGB CLI flag in docker-compose).

storage:
  directoryPerDB: true
  wiredTiger:
    engineConfig:
      journalCompressor: zstd
    collectionConfig:
      blockCompressor: zstd

net:
  bindIp: 0.0.0.0

setParameter:
  diagnosticDataCollectionEnabled: false
