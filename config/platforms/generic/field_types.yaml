# Generic field type definitions
# Basic types for arbitrary JSON/CSV data processing
#
# Supported types:
#   - integer: Integer values
#   - bigint: Large integer values
#   - float: Floating point numbers
#   - boolean: True/False values
#   - text: Variable-length strings
#   - ['char', N]: Fixed-length string of N characters
#   - ['varchar', N]: Variable-length string up to N characters
#
# To use the generic platform:
#   1. Create a field_list.yaml with your data type and fields
#   2. Add field types here for any fields requiring type enforcement
#   3. Run with PLATFORM=generic

# Common fields (add your own below)
id: text
created_at: integer
timestamp: integer
text: text
content: text
author: text
title: text
url: text
score: integer
count: integer

# Lingua language detection fields
lang_chars: integer          # Character count of cleaned text used for language detection
