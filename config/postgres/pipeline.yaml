# PostgreSQL database profile pipeline configuration
# Host paths configured in .env

database:
  host: postgres             # Docker service name
  port: 5432                 # Override with POSTGRES_PORT env var
  name: datasets             # Override with DB_NAME env var
  schema: reddit             # Override with DB_SCHEMA env var
  user: postgres

processing:
  data_types:                # Which data types to process
    - submissions
    - comments
  parallel_mode: false       # If true: extract all -> parse parallel -> ingest all
  parallel_ingestion: true   # If true: ingest submissions and comments concurrently (requires parallel_mode = true)
  parse_workers: 12          # Number of parallel workers for CSV parsing
  check_duplicates: true     # Handle duplicate IDs during ingestion
  create_indexes: true       # Create indexes after ingestion
  cleanup_temp: false        # Delete intermediate files after ingestion
  watch_interval: 0          # check for new files every N minutes (0 = run once)
  prefer_lingua: true       # If true: ingest lingua CSVs (from ml_cpu output) instead of original CSVs; falls back to original if not found

# Index configuration (only used if create_indexes is true)
indexes:
  submissions:
    - dataset
    - author
    - subreddit
    - domain
    - created_utc
  comments:
    - dataset
    - author
    - subreddit
    - link_id
    - created_utc
