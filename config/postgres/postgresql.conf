# PostgreSQL configuration for postgres profile
# For memory/performance tuning, generate settings with pgtune:
# https://pgtune.leopard.in.ua/ (DB Type: dw, Data Storage: ssd)

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

# Listen on all interfaces. Actual connection permission is handled by pg_hba.conf
listen_addresses = '*'

#------------------------------------------------------------------------------
# SAFETY & DURABILITY
#------------------------------------------------------------------------------
# High durability settings. Ensures the database can recover automatically 
# from power failure or OS crashes without data corruption.
fsync = on
full_page_writes = on

# Performance optimization: Transactions report success after writing to 
# memory but before the final disk flush. High speed with minimal risk.
synchronous_commit = off

#------------------------------------------------------------------------------
# AUTOVACUUM (Table Management)
#------------------------------------------------------------------------------
# The background daemon is disabled to prevent unpredictable I/O spikes 
# during analytical queries. Manual maintenance (ANALYZE/VACUUM) is 
# expected at the end of ingestion scripts.
autovacuum = off

#------------------------------------------------------------------------------
# MEMORY & INGESTION
#------------------------------------------------------------------------------
# Memory allocation for temporary tables used during data merges.
temp_buffers = 4GB

# No limit on temporary file size; allows massive sorts to spill to 
# storage rather than failing the query.
temp_file_limit = -1

#------------------------------------------------------------------------------
# QUERY PERFORMANCE
#------------------------------------------------------------------------------
# Just-In-Time (JIT) compilation is enabled to optimize complex 
# aggregations across billion-row datasets.
# These are default PG12+ settings.
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

#------------------------------------------------------------------------------
# PARALLELISM & COSTING (Analytical Tuning)
#------------------------------------------------------------------------------
# These settings override default planner costs to favor parallel execution 
# on multi-core systems, preventing complex queries from falling into 
# single-threaded index scans.

# Reduces the estimated cost of launching parallel workers, encouraging 
# the planner to use multiple cores for medium-to-large queries.
parallel_setup_cost = 50

# Reduces the estimated cost of passing rows between workers.
# Default is 0.1. Lowering to 0.01 makes parallel plans 10x more attractive.
parallel_tuple_cost = 0.01

# Sets a baseline for parallel worker usage. Allows a single analytical 
# query to utilize up to 4 background threads.
max_parallel_workers_per_gather = 4

# Disk Costing:
# Slightly favors Sequential Scans (1.0) over Random Index Scans (1.1).
# This prevents the planner from choosing an inefficient index scan 
# when reading large portions (>5%) of the table.
random_page_cost = 1.1
seq_page_cost = 1.0

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------
# Minimum logging enabled to reduce I/O overhead and keep log files clean.
log_destination = 'stderr'
logging_collector = off
client_min_messages = error
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = -1
log_connections = off
log_disconnections = off
log_checkpoints = off
log_temp_files = -1

#------------------------------------------------------------------------------
# ADVANCED SPEED OPTIONS (Commented Out by Default)
#------------------------------------------------------------------------------
# These settings provide maximum ingestion speed but disable the ability to 
# use Replication or Point-in-Time Recovery (PITR) backups. 
# Requires database restart to take effect.

# wal_level = minimal            # Reduces disk writes during COPY/INSERT
# max_wal_senders = 0            # Disables replication background processes

#==============================================================================
# PASTE PGTUNE OUTPUT BELOW THIS LINE
#==============================================================================
# DB Version: 18
# OS Type: linux
# DB Type: dw
# Total Memory (RAM): 60 GB
# CPUs num: 24
# Connections num: 20
# Data Storage: ssd

max_connections = 20
shared_buffers = 15GB
effective_cache_size = 45GB
maintenance_work_mem = 2GB
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 500
random_page_cost = 1.1
effective_io_concurrency = 200
work_mem = 178734kB
huge_pages = try
min_wal_size = 4GB
max_wal_size = 16GB
max_worker_processes = 24
max_parallel_workers_per_gather = 12
max_parallel_workers = 24
max_parallel_maintenance_workers = 4