# PostgreSQL ML pipeline configuration
# Ingests ML classifier outputs into PostgreSQL tables

database:
  host: postgres             # Docker service name
  port: 5432                 # Override with POSTGRES_PORT env var
  name: datasets             # Override with DB_NAME env var
  schema: reddit             # Override with DB_SCHEMA env var
  user: postgres

processing:
  data_types:                # Which data types to process
    - submissions
    - comments
  check_duplicates: true     # Handle duplicate IDs during ingestion
  type_inference_rows: 1000  # Rows to sample for column type inference
  use_foreign_key: true      # Add foreign key constraint to main table (submissions/comments)
                             # Requires main table to exist. Set false for independent ingestion.
  watch_interval: 0          # Check for new files every N minutes (0 = run once)
  fast_initial_load: true   # If true: use optimized bulk load for initial ingestion (UNLOGGED table, blind COPY, post-load dedup)
  # Note: prefer_lingua is read from postgres profile (config/postgres/pipeline.yaml)
  # If true: skip lingua classifier (data already in main table)
  # If false: ingest lingua from lingua_ingest folder
