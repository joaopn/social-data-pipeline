# Sidecar service definitions for ML classifier outputs
# Column types are auto-inferred from CSV data (no manual column definitions needed)
#
# Each sidecar maps to a classifier output directory in /data/output/
# Tables are created as: {data_type}_base_{sidecar_name} (e.g., submissions_base_lingua)
# Views are auto-rebuilt to join base tables with sidecars
#
# table_columns: Base table columns to include in sidecar table (empty = none, classifier cols only)
# view_columns: Columns to include in view (empty = all table columns)

sidecars:
  lingua:
    enabled: true
    source_dir: lingua        # Directory under /data/output/
    suffix: "_lingua"         # File suffix pattern (e.g., RS_2024-01_lingua.csv)
    table_columns: []         # Base columns to keep (empty = classifier columns only)
    view_columns:             # Columns to include in view (empty = all)
      - lang
      - lang2
  
